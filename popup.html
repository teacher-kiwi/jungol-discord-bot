<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 280px;
            padding: 15px;
            font-family: 'Malgun Gothic', sans-serif;
            color: #333;
        }

        h3 {
            margin-top: 0;
            color: #4a66c3;
            /* 정올 파란색 */
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4a66c3;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #3a509a;
        }
    </style>
</head>

<body>
    <h3>정올 알리미 설정</h3>

    <div class="input-group">
        <label for="webhookUrl">디스코드 웹훅 URL</label>
        <input type="text" id="webhookUrl" placeholder="https://discord.com/api/webhooks/..." />
        <p style="margin: 5px 0 0; font-size: 11px; color: #e74c3c;">웹훅 URL은 타인에게 공유하지 마세요.</p>
    </div>

    <button id="saveBtn">저장하기</button>

    <script src="popup.js"></script>
</body>

</html>
